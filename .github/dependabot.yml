version: 2
updates:
  # Go module dependencies (root go.mod)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "Bump"
    groups:
      # Bundle all minor and patch bumps into a single PR to cut noise
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "Bump"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
